<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
  body {
    font-family: 'Nanum Gothic', sans-serif;
    background: #1e1e2f;
    color: #fff;
    padding: 50px;
    line-height: 2;
  }

  p {
    font-size: 1.5rem;
    position: relative;
  }

  /* 강조 텍스트 + 유동적 스케일 */
  .highlight {
    font-weight: 700;
    display: inline-block;
    transition: transform 0.6s ease, letter-spacing 0.6s ease;
  }

  .highlight.grow {
    transform: scale(1.1);
    letter-spacing: 0.05em;
    padding: 0;
  }

  /* 텍스트 위 이미지 (/새로운 가능성/) */
  .highlight-container.top {
    position: relative;
    display: inline-block;
  }

  .highlight-container.top img {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%) translateY(20px) scale(0.9);
    opacity: 0;
    width: 50px;
    display: none; /* 초반에는 안 보임 */
    transition: transform 0.6s ease, opacity 0.6s ease;
    pointer-events: none;
  }

  .highlight-container.top img.show {
    display: inline-block; /* 등장 시 보이게 */
    transform: translateX(-50%) translateY(0) scale(1);
    opacity: 1;
  }

  /* 텍스트 사이 inline 이미지 (/스며들며/ 왼쪽, /나만의 색으로/ 오른쪽) */
  .highlight-container-inline {
    display: inline-flex;
    align-items: baseline;
    gap: 0; /* 초반에는 gap 없음 */
    transition: gap 0.3s ease;
  }

  /* 이미지 등장 시 gap 적용 */
  .highlight-container-inline.show-gap {
    gap: 18px;
  }

  /* 왼쪽 이미지 */
  .highlight-container-inline.left img {
    width: 50px;
    transform: translateX(-20px);
    opacity: 0;
    display: none;
    transition: transform 0.6s ease, opacity 0.6s ease;
  }

  .highlight-container-inline.left img.show {
    display: inline-block;
    transform: translateX(0);
    opacity: 1;
  }

  /* 오른쪽 이미지 */
  .highlight-container-inline.right img {
    width: 50px;
    transform: translateX(20px);
    opacity: 0;
    display: none;
    transition: transform 0.6s ease, opacity 0.6s ease;
  }

  .highlight-container-inline.right img.show {
    display: inline-block;
    transform: translateX(0);
    opacity: 1;
  }
</style>
</head>
<body>

<p>
  아침의 빛처럼 
  <span class="highlight-container top">
    <img src="img/sun.png" alt="해이미지">
    <span class="highlight">새로운 가능성</span>
  </span>을 향해,<br>

  구름처럼 온화하게 
  <span class="highlight-container-inline left">
    <img src="img/cloud.png" alt="구름이미지">
    <span class="highlight">스며들며</span>
  </span>,<br>

  밤하늘 별처럼 
  <span class="highlight-container-inline right">
    <span class="highlight">나만의 색으로</span>
    <img src="img/star.png" alt="별이미지">
  </span> 빛나는,<br>

  작은 일에도 최선을 다하며 끊임없이 배우는<br>
  신입 웹퍼블리셔 & 디자이너 김은주입니다.
</p>

<script>
const containers = document.querySelectorAll('.highlight-container, .highlight-container-inline');
const delayBetween = 400; // 순차 딜레이

function animateImages() {
  containers.forEach((container, index) => {
    const rect = container.getBoundingClientRect();
    if (rect.top < window.innerHeight - 50 && rect.bottom > 0) {
      const img = container.querySelector('img');
      const text = container.querySelector('.highlight');

      setTimeout(() => {
        img.classList.add('show');
        text.classList.add('grow');

        // 이미지 등장 시 gap 적용 (왼쪽/오른쪽 inline만)
        if(container.classList.contains('highlight-container-inline')) {
          container.classList.add('show-gap');
        }

        // 이미지와 텍스트 상태 그대로 유지
      }, index * delayBetween);
    }
  });
}

window.addEventListener('scroll', animateImages);
window.addEventListener('load', animateImages);
</script>

</body>
</html>
